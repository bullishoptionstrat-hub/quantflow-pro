services:
  - type: web
    name: quantflow-pro-backend
    runtime: node
    rootDir: backend
    region: ohio
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: TRADIER_TOKEN
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: ALPACA_KEY
        sync: false
      - key: ALPACA_SECRET
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

  - type: web
    name: quantflow-pro-ml
    runtime: python
    rootDir: ml-service
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt && python train.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
